name: recipe_hunter
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  connectivity_plus: ^7.1.1
  http: ^1.6.0
  gap: ^3.0.1
  iconsax: ^0.0.8
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/biryani/
    - assets/breads/
    - assets/burgres/
    - assets/cakes/
    - assets/drinks/
    - assets/noodles/
    - assets/pizza/
    - assets/images/
    - assets/indi/

  fonts:
    - family: poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf

    - family: manrope
      fonts:
        - asset: assets/fonts/manrope-regular.otf

    - family: mons
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf